
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedHeads</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>MedHeads</h1>

<div id="menu">

<label>Select Category</label>

<select id="category">
<option value="diagnoses">Diagnoses</option>
<option value="microbiology">Microbiology</option>
<option value="antibiotics">Antibiotics</option>
<option value="anatomy">Anatomy</option>
<option value="clinical_signs">Clinical Signs</option>
<option value="imaging">Imaging</option>
</select>

<button onclick="startGame()">Start Game</button>
<button onclick="studyMode()">Study Mode</button>

</div>

<div id="game" class="hidden">

<div id="card">
<h2 id="term">Press Start</h2>
</div>

<div class="buttons">
<button class="correct" onclick="correct()">Correct</button>
<button class="pass" onclick="pass()">Pass</button>
</div>

<p>Score: <span id="score">0</span></p>
<p>Time: <span id="timer">60</span></p>

</div>

</div>

<script src="deck.js"></script>
<script src="script.js"></script>

</body>
</html>
