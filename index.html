<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Heads Up!</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Medical Heads Up!</h1>

<div id="menu">

<select id="category">
<option value="diagnoses">Diagnoses</option>
<option value="microbiology">Microbiology</option>
<option value="antibiotics">Antibiotics</option>
<option value="anatomy">Anatomy</option>
<option value="clinical_signs">Clinical Signs</option>
<option value="imaging">Imaging</option>
</select>

<button onclick="startGame()">Start Game</button>

<button onclick="studyMode()">Study Mode</button>

</div>

<div id="game" class="hidden">

<h2 id="term">Press Start</h2>

<div class="buttons">

<button onclick="correct()">Correct</button>
<button onclick="pass()">Pass</button>

</div>

<p>Score: <span id="score">0</span></p>
<p>Time: <span id="timer">60</span></p>

</div>

</div>

<script src="deck.js"></script>
<script src="script.js"></script>

</body>

</html>
