
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Heads Up!</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Medical Heads Up!</h1>

<div id="menu">

<label>Select Category</label>

<select id="category">
<option value="diagnoses">Diagnoses</option>
<option value="microbiology">Microbiology</option>
<option value="antibiotics">Antibiotics</option>
<option value="anatomy">Anatomy</option>
<option value="clinical_signs">Clinical Signs</option>
<option value="imaging">Imaging</option>
</select>

<button id="startBtn">Start Game</button>
<button id="studyBtn">Study Mode</button>

</div>

<div id="game" class="hidden">

<div id="card">
<div id="term">Ready</div>
</div>

<div id="controls">

<button id="correctBtn">Correct</button>
<button id="passBtn">Pass</button>

</div>

<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="timer">60</span></div>
</div>

</div>

<script src="deck.js"></script>
<script src="script.js"></script>

</body>
</html>
